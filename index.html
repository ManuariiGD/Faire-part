<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faire-Part – Olivia & Manuarii</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel+Decorative:wght@400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  min-height:100vh;
  background:#f5f0ea;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  font-family:'Cormorant Garamond',serif;
  padding:40px 20px; gap:32px;
}

h1 {
  font-family:'Cinzel Decorative',serif;
  font-size:11px; letter-spacing:0.35em;
  color:#8a9e7e; text-transform:uppercase;
}

/* ── PERSPECTIVE CONTAINER ── */
#outer {
  perspective: 2200px;
  perspective-origin: 50% 50%;
  width:560px; height:443px;
}

/* ── FLIPPER: rotates for back reveal ── */
#flipper {
  width:560px; height:443px;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 0.9s cubic-bezier(0.645,0.045,0.355,1);
}

#flipper.flipped {
  transform: translateX(-280px) rotateY(180deg);
}

/* ── FRONT FACE: the book ── */
#book {
  position:absolute; inset:0;
  width:560px; height:443px;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
}

/* ── BACK FACE: shows the back image on right side, left is empty ── */
#back-face {
  position:absolute; inset:0;
  width:560px; height:443px;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  transform:rotateY(180deg);
  /* left half: same plain background color, no gradient needed */
  background:#f5f0ea;
}
/* back image sits in the RIGHT half only */
#back-face img {
  position:absolute;
  right:0; top:0;
  width:280px; height:443px;
  object-fit:cover; display:block;
  border-radius:4px 10px 10px 4px;
  box-shadow:8px 4px 28px rgba(0,0,0,0.22);
}

/* ── INSIDE_RIGHT: static right page (visible when open) ── */
#page-right {
  position:absolute;
  left:280px; top:0;
  width:280px; height:443px;
  overflow:hidden;
  border-radius:0 10px 10px 0;
  background:#faf8f5;
  box-shadow:8px 4px 24px rgba(0,0,0,0.15);
}
#page-right img { width:100%; height:100%; object-fit:cover; display:block; }

/* ── INSIDE_LEFT: static left page (visible when open) ── */
#page-left {
  position:absolute;
  left:0; top:0;
  width:280px; height:443px;
  overflow:hidden;
  border-radius:4px 0 0 4px;
  background:#faf8f5;
}
#page-left img { width:100%; height:100%; object-fit:cover; display:block; }

/* ── SPINE SHADOW: visible only when open ── */
#spine {
  position:absolute;
  left:274px; top:0;
  width:12px; height:443px;
  background:linear-gradient(to right,
    rgba(0,0,0,0.16) 0%,
    rgba(0,0,0,0.04) 45%,
    rgba(255,255,255,0.18) 50%,
    rgba(0,0,0,0.04) 55%,
    rgba(0,0,0,0.10) 100%
  );
  z-index:20; pointer-events:none;
  opacity:0;
  transition:opacity 0.3s ease 0.9s;
}
#book.open #spine { opacity:1; }

/* ── THE COVER ──
   Closed → rotateY(0): front image visible, covers left half
   Open   → rotateY(-180deg): swings left, reveals inside_left on back face
   
   Key insight: transform-origin is RIGHT center = the spine.
   When closed, the cover sits over the LEFT half (left:0, width:W).
   When open, it has rotated -180deg so its back face shows on the left.
   inside_right is on the right half and becomes visible.
   No mask needed — the cover itself hides the left half when closed,
   and page-right is covered by... nothing! We need a right-mask.

   BUT the right-mask problem: we can't use background-color because
   the body has a gradient. Solution: make the mask transparent by default
   and use clip/overflow on #book instead, OR use a solid plain color
   and accept the slight mismatch... 
   
   Better solution: DON'T use a mask. Instead, clip #book to W wide when
   closed, and expand to 2*W when open. We do this by clipping with
   overflow:hidden on a wrapper, animating its width.
── */

/* ── CLIP WRAPPER: clips the book to right half when closed ── */
#clip {
  position:absolute; inset:0;
  /* when closed: only show RIGHT W pixels — hide left half where cover-back would peek */
  clip-path: inset(0 0 0 280px);
  transition: clip-path 0s ease 0.55s;
}
#book.open #clip {
  clip-path: inset(0 0 0 0);
  transition: clip-path 0s ease 0s;
}

/* ── COVER ──
   Sits over the RIGHT half (left:W).
   Spine = LEFT edge → transform-origin: left center.
   Closed: rotateY(0)   → shows front image over right half
   Open:   rotateY(180deg) → flips to left half, shows inside_left
── */
#cover {
  position:absolute;
  left:280px; top:0;
  width:280px; height:443px;
  transform-origin:left center;
  transform-style:preserve-3d;
  transition:transform 1.1s cubic-bezier(0.645,0.045,0.355,1);
  z-index:10;
}
#book.open #cover { transform:rotateY(180deg); }

/* Cover front = FRONT image */
#cover-front {
  position:absolute; inset:0;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  overflow:hidden;
  border-radius:4px 10px 10px 4px;
  box-shadow:8px 4px 28px rgba(0,0,0,0.28), 2px 0 8px rgba(0,0,0,0.10);
}
#cover-front img { width:100%; height:100%; object-fit:cover; display:block; }

/* Cover back = INSIDE_LEFT */
#cover-back {
  position:absolute; inset:0;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  transform:rotateY(180deg);
  overflow:hidden;
  border-radius:10px 4px 4px 10px;
  box-shadow:-4px 0 16px rgba(0,0,0,0.10);
}
#cover-back img { width:100%; height:100%; object-fit:cover; display:block; }

/* ── CONTROLS ── */
.controls { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }
button {
  background:transparent;
  border:1px solid #8a9e7e; color:#5a7050;
  font-family:'Cormorant Garamond',serif;
  font-size:13px; letter-spacing:0.18em;
  padding:9px 22px; cursor:pointer;
  text-transform:uppercase; border-radius:2px;
  transition:background 0.25s, color 0.25s;
}
button:hover:not(:disabled) { background:#8a9e7e; color:#fff; }
button:disabled { opacity:0.35; cursor:default; }
.hint {
  font-size:12px; letter-spacing:0.14em;
  color:#9a8e7e; font-style:italic; text-align:center;
  transition:opacity 0.3s;
}
</style>
</head>

<p class="hint" id="hint">Faire-part fermé · couverture visible</p>

<div class="controls">
  <button id="btnOpen"  onclick="openBook()">✦ Ouvrir</button>
  <button id="btnClose" onclick="closeBook()" disabled>✦ Fermer</button>
  <button id="btnFlip"  onclick="flipBook()">↻ Retourner (Brunch)</button>
</div>

<script>
  let isOpen=false, isFlipped=false;
  const book    = document.getElementById('book');
  const flipper = document.getElementById('flipper');
  const hint    = document.getElementById('hint');
  const btnOpen  = document.getElementById('btnOpen');
  const btnClose = document.getElementById('btnClose');
  const btnFlip  = document.getElementById('btnFlip');

  function setHint(t) {
    hint.style.opacity=0;
    setTimeout(()=>{hint.textContent=t; hint.style.opacity=1;},220);
  }

  function openBook() {
    if(isOpen) return;
    if(isFlipped) { flipper.classList.remove('flipped'); isFlipped=false; }
    isOpen=true;
    book.classList.add('open');
    setHint('Faire-part ouvert · pages intérieures');
    btnOpen.disabled=true; btnClose.disabled=false; btnFlip.disabled=true;
  }

  function closeBook() {
    if(!isOpen) return;
    isOpen=false;
    book.classList.remove('open');
    setHint('Faire-part fermé · couverture visible');
    btnOpen.disabled=false; btnClose.disabled=true; btnFlip.disabled=false;
  }

  function flipBook() {
    if(isOpen) return;
    isFlipped=!isFlipped;
    flipper.classList.toggle('flipped',isFlipped);
    setHint(isFlipped?'Dos du faire-part':'Faire-part fermé · couverture visible');
  }
</script>
